  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

{"value":"\u003c!DOCTYPE html\u003e\n\u003chtml lang=\"id\"\u003e\u003chead\u003e\n\u003cmeta charset=\"utf-8\"\u003e\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1\"\u003e\n\u003ctitle\u003eSistem Rincian SPD — Imigrasi 2026\u003c/title\u003e\n\u003cstyle\u003e\n  /* ============================================================\n     TOKENS\n     ============================================================ */\n  :root{\n    --bg:        #0A1628;\n    --panel:     #0D1F3C;\n    --card:      #112240;\n    --card-2:    #0F1E3A;\n    --border:    #1E3A5F;\n    --border-2:  #2A4A6F;\n    --input:     #1A2E4A;\n    --gold:      #C8A951;\n    --gold-2:    #A8892F;\n    --gold-soft: #E2C77A;\n    --blue:      #1A6EBD;\n    --blue-2:    #1558A0;\n    --text:      #E8F0FE;\n    --text-2:    #8BA7C7;\n    --text-3:    #5E789C;\n    --danger:    #E5484D;\n    --ok:        #2BB673;\n    --radius:    8px;\n    --radius-sm: 5px;\n    --shadow:    0 6px 20px rgba(0,0,0,.35);\n    --font:      \u0027Segoe UI\u0027, system-ui, -apple-system, Arial, sans-serif;\n  }\n\n  *{ box-sizing: border-box; }\n  html, body{ height: 100%; }\n  body{\n    margin:0; background: var(--bg); color: var(--text);\n    font-family: var(--font); font-size: 14px; line-height: 1.45;\n    -webkit-font-smoothing: antialiased;\n  }\n  button, input, select, textarea{ font-family: inherit; font-size: inherit; color: inherit; }\n\n  /* ============================================================\n     APP SHELL\n     ============================================================ */\n  .app{ min-height: 100vh; display: flex; flex-direction: column; }\n\n  .topbar{\n    background: linear-gradient(180deg, #0E2245 0%, #0A1B36 100%);\n    border-bottom: 1px solid var(--border);\n    padding: 14px 28px;\n    display: flex; align-items: center; gap: 18px;\n    position: sticky; top: 0; z-index: 20;\n  }\n  .topbar .crest{\n    width: 52px; height: 52px; flex: 0 0 52px;\n    border-radius: 50%; object-fit: contain;\n    filter: drop-shadow(0 2px 6px rgba(0,0,0,.4));\n  }\n  .topbar .titles{ flex: 1; min-width: 0; }\n  .topbar h1{\n    margin: 0; font-size: 18px; letter-spacing: .14em;\n    color: var(--text); font-weight: 700;\n  }\n  .topbar h1 .accent{ color: var(--gold); }\n  .topbar .sub{\n    margin-top: 2px; font-size: 11px; letter-spacing: .18em;\n    color: var(--text-2); text-transform: uppercase;\n  }\n  .topbar .meta{\n    text-align: right; font-size: 11px; color: var(--text-3);\n    letter-spacing: .1em;\n  }\n  .topbar .meta strong{ color: var(--gold-soft); font-weight: 600; }\n\n  /* Tabs */\n  .tabs{\n    background: var(--panel);\n    border-bottom: 1px solid var(--border);\n    padding: 0 28px;\n    display: flex; gap: 6px;\n    position: sticky; top: 76px; z-index: 19;\n  }\n  .tab{\n    appearance: none; background: transparent; border: 0;\n    padding: 14px 22px; cursor: pointer;\n    color: var(--text-2); font-size: 13px; letter-spacing: .14em;\n    text-transform: uppercase; font-weight: 600;\n    border-bottom: 2px solid transparent;\n    transition: color .15s, border-color .15s;\n  }\n  .tab:hover{ color: var(--text); }\n  .tab.active{\n    color: var(--text);\n    border-bottom-color: var(--gold);\n  }\n  .tab .dot{\n    display: inline-block; width: 6px; height: 6px; border-radius: 50%;\n    background: var(--gold); margin-right: 8px; vertical-align: middle;\n    opacity: .35;\n  }\n  .tab.active .dot{ opacity: 1; box-shadow: 0 0 8px var(--gold); }\n\n  /* Main */\n  .main{ padding: 24px 28px 48px; max-width: 1380px; width: 100%; margin: 0 auto; }\n  .view{ display: none; }\n  .view.active{ display: block; }\n\n  /* ============================================================\n     CARDS / SECTIONS\n     ============================================================ */\n  .section{\n    background: var(--card);\n    border: 1px solid var(--border);\n    border-radius: var(--radius);\n    margin-bottom: 20px;\n    box-shadow: var(--shadow);\n    overflow: hidden;\n  }\n  .section-head{\n    display: flex; align-items: center; gap: 12px;\n    padding: 14px 20px;\n    background: linear-gradient(180deg, rgba(200,169,81,.06), transparent);\n    border-bottom: 1px solid var(--border);\n  }\n  .section-head .num{\n    width: 26px; height: 26px; border-radius: 4px;\n    background: var(--gold); color: #1A1305;\n    display: grid; place-items: center; font-weight: 700; font-size: 12px;\n  }\n  .section-head h2{\n    margin: 0; font-size: 13px; letter-spacing: .16em;\n    text-transform: uppercase; font-weight: 700;\n  }\n  .section-head .hint{\n    margin-left: auto; font-size: 11px; color: var(--text-3);\n    letter-spacing: .08em;\n  }\n  .section-body{ padding: 18px 20px 20px; }\n\n  /* ============================================================\n     FORM FIELDS\n     ============================================================ */\n  .grid{ display: grid; gap: 14px; }\n  .g-2{ grid-template-columns: repeat(2, minmax(0,1fr)); }\n  .g-3{ grid-template-columns: repeat(3, minmax(0,1fr)); }\n  .g-4{ grid-template-columns: repeat(4, minmax(0,1fr)); }\n  .g-6{ grid-template-columns: repeat(6, minmax(0,1fr)); }\n  .col-2{ grid-column: span 2; }\n  .col-3{ grid-column: span 3; }\n  .col-4{ grid-column: span 4; }\n  .col-6{ grid-column: span 6; }\n  .col-all{ grid-column: 1 / -1; }\n\n  .field label{\n    display: block; font-size: 11px; letter-spacing: .12em;\n    text-transform: uppercase; color: var(--text-2);\n    margin-bottom: 6px; font-weight: 600;\n  }\n  .field label .req{ color: var(--gold); margin-left: 3px; }\n  .field input, .field select, .field textarea{\n    width: 100%; padding: 10px 12px;\n    background: var(--input);\n    border: 1px solid var(--border-2);\n    color: var(--text);\n    border-radius: var(--radius-sm);\n    outline: none;\n    transition: border-color .15s, box-shadow .15s, background .15s;\n  }\n  .field input:focus, .field select:focus, .field textarea:focus{\n    border-color: var(--gold);\n    box-shadow: 0 0 0 3px rgba(200,169,81,.18);\n    background: #1F375C;\n  }\n  .field textarea{ resize: vertical; min-height: 64px; }\n  .field input[type=\"number\"]{ font-variant-numeric: tabular-nums; }\n  .field.invalid input, .field.invalid select, .field.invalid textarea{\n    border-color: var(--danger);\n    box-shadow: 0 0 0 3px rgba(229,72,77,.15);\n  }\n  .field .hint{ font-size: 11px; color: var(--text-3); margin-top: 4px; }\n\n  /* Pegawai card */\n  .pegawai-card{\n    background: var(--card-2);\n    border: 1px solid var(--border);\n    border-radius: var(--radius);\n    margin-bottom: 14px;\n    overflow: hidden;\n  }\n  .pegawai-head{\n    display: flex; align-items: center; gap: 12px;\n    padding: 10px 16px;\n    background: linear-gradient(90deg, rgba(26,110,189,.18), transparent 60%);\n    border-bottom: 1px solid var(--border);\n  }\n  .pegawai-head .badge{\n    width: 26px; height: 26px; border-radius: 50%;\n    background: var(--blue); color: #fff;\n    display: grid; place-items: center; font-weight: 700; font-size: 12px;\n  }\n  .pegawai-head .name{ font-weight: 600; color: var(--text); }\n  .pegawai-head .name .placeholder{ color: var(--text-3); font-weight: 500; }\n  .pegawai-head .actions{ margin-left: auto; display: flex; gap: 8px; }\n  .pegawai-body{ padding: 14px 16px; }\n\n  .pegawai-totals{\n    margin-top: 14px; padding-top: 14px;\n    border-top: 1px dashed var(--border-2);\n    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;\n  }\n  .stat{\n    background: rgba(255,255,255,.02);\n    border: 1px solid var(--border);\n    border-radius: var(--radius-sm);\n    padding: 10px 12px;\n  }\n  .stat .k{ font-size: 10px; color: var(--text-3); letter-spacing: .14em; text-transform: uppercase; }\n  .stat .v{ margin-top: 4px; font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; }\n  .stat.total{\n    background: linear-gradient(135deg, rgba(200,169,81,.18), rgba(200,169,81,.04));\n    border-color: rgba(200,169,81,.5);\n  }\n  .stat.total .v{ color: var(--gold-soft); font-size: 16px; }\n\n  /* Bukti block */\n  .bukti-block{\n    margin-top: 14px; padding: 14px 16px;\n    background: rgba(26,110,189,.06);\n    border: 1px solid var(--border);\n    border-radius: var(--radius-sm);\n  }\n  .bukti-title{\n    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;\n    color: var(--text-2); font-weight: 600; margin-bottom: 12px;\n    display: flex; align-items: center; gap: 8px;\n  }\n  .bukti-title::before{\n    content: \"📎\"; font-size: 13px;\n  }\n  .bukti-block select{ font-size: 13px; }\n\n  /* DPR line items */\n  .dpr-item{\n    background: var(--card-2);\n    border: 1px solid var(--border);\n    border-radius: var(--radius-sm);\n    padding: 12px 14px; margin-bottom: 10px;\n  }\n  .dpr-item-head{\n    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;\n  }\n  .dpr-item-head .ix{\n    width: 22px; height: 22px; border-radius: 4px; flex: 0 0 22px;\n    background: var(--blue); color: #fff; display: grid; place-items: center;\n    font-size: 11px; font-weight: 700;\n  }\n  .dpr-item-head .calc{\n    margin-left: auto; font-size: 12px; color: var(--gold-soft);\n    font-variant-numeric: tabular-nums; font-weight: 600;\n  }\n  .dpr-calc-row{\n    display: grid; gap: 8px; align-items: end;\n    grid-template-columns: 1fr 70px 80px 70px 80px 1.2fr;\n  }\n  .dpr-calc-row .op{\n    text-align: center; color: var(--text-3); font-weight: 700; padding-bottom: 10px;\n  }\n  .grp-total{\n    margin-top: 14px; padding: 12px 16px;\n    background: linear-gradient(135deg, rgba(200,169,81,.16), rgba(200,169,81,.04));\n    border: 1px solid rgba(200,169,81,.5); border-radius: var(--radius-sm);\n    display: flex; align-items: center; gap: 14px;\n  }\n  .grp-total .lbl{ font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-2); }\n  .grp-total .amt{ margin-left: auto; font-size: 18px; font-weight: 700; color: var(--gold-soft); font-variant-numeric: tabular-nums; }\n  .grp-total .terb{ flex-basis: 100%; font-size: 12px; color: var(--text-3); font-style: italic; }\n  @media (max-width: 900px){\n    .dpr-calc-row{ grid-template-columns: 1fr 1fr; }\n    .dpr-calc-row .op{ display: none; }\n  }\n\n  /* ============================================================\n     BUTTONS\n     ============================================================ */\n  .btn{\n    appearance: none; border: 1px solid transparent;\n    padding: 10px 16px; border-radius: var(--radius-sm);\n    cursor: pointer; font-weight: 600; font-size: 13px;\n    letter-spacing: .04em;\n    display: inline-flex; align-items: center; gap: 8px;\n    transition: transform .05s, background .15s, border-color .15s, box-shadow .15s;\n    white-space: nowrap;\n  }\n  .btn:active{ transform: translateY(1px); }\n  .btn-primary{\n    background: linear-gradient(180deg, var(--gold) 0%, var(--gold-2) 100%);\n    color: #1A1305;\n    box-shadow: 0 2px 0 rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.3);\n  }\n  .btn-primary:hover{ filter: brightness(1.05); }\n  .btn-print{\n    background: var(--blue); color: #fff;\n    border-color: var(--blue-2);\n  }\n  .btn-print:hover{ background: var(--blue-2); }\n  .btn-ghost{\n    background: transparent; color: var(--text);\n    border-color: var(--border-2);\n  }\n  .btn-ghost:hover{ background: rgba(255,255,255,.04); border-color: var(--gold); color: var(--gold-soft); }\n  .btn-danger{\n    background: transparent; color: var(--danger);\n    border-color: rgba(229,72,77,.4);\n  }\n  .btn-danger:hover{ background: rgba(229,72,77,.1); }\n  .btn-sm{ padding: 6px 10px; font-size: 12px; }\n  .btn-icon{ padding: 6px 8px; }\n\n  .actions-bar{\n    position: sticky; bottom: 0;\n    margin: 0 -28px -48px;\n    padding: 14px 28px;\n    background: linear-gradient(180deg, transparent, rgba(10,22,40,.92) 40%);\n    backdrop-filter: blur(8px);\n    border-top: 1px solid var(--border);\n    display: flex; gap: 10px; flex-wrap: wrap;\n    z-index: 5;\n  }\n  .actions-bar .spacer{ flex: 1; }\n\n  .add-btn{\n    width: 100%; padding: 14px;\n    border: 1.5px dashed var(--border-2);\n    background: transparent;\n    color: var(--text-2);\n    border-radius: var(--radius);\n    cursor: pointer; font-weight: 600;\n    letter-spacing: .1em; text-transform: uppercase; font-size: 12px;\n    transition: color .15s, border-color .15s, background .15s;\n  }\n  .add-btn:hover{ color: var(--gold); border-color: var(--gold); background: rgba(200,169,81,.05); }\n  .add-btn:disabled{ opacity: .4; cursor: not-allowed; }\n\n  /* DPR PIC preview pane */\n  .preview-shell{\n    background: var(--card);\n    border: 1px solid var(--border);\n    border-radius: var(--radius);\n    padding: 24px;\n    box-shadow: var(--shadow);\n  }\n  .preview-shell .preview-bar{\n    display: flex; align-items: center; gap: 10px;\n    margin-bottom: 18px; padding-bottom: 14px;\n    border-bottom: 1px solid var(--border);\n  }\n  .preview-shell .preview-bar h2{\n    margin: 0; font-size: 13px; letter-spacing: .16em; text-transform: uppercase;\n  }\n  .preview-shell .preview-bar .spacer{ flex: 1; }\n  .paper{\n    background: #fff; color: #111;\n    padding: 22mm 18mm;\n    margin: 0 auto;\n    width: 210mm; min-height: 297mm;\n    font-family: \u0027Times New Roman\u0027, Georgia, serif;\n    font-size: 11pt; line-height: 1.4;\n    box-shadow: 0 8px 30px rgba(0,0,0,.45);\n  }\n  .paper-stack{\n    display: flex; flex-direction: column;\n    gap: 28px; align-items: center;\n  }\n  .paper-stack .paper{ margin: 0; }\n  .paper-page-label{\n    align-self: center; margin: 0 auto;\n    font-size: 11px; letter-spacing: .16em; text-transform: uppercase;\n    color: var(--text-3); font-weight: 600;\n    display: flex; align-items: center; gap: 10px;\n  }\n  .paper-page-label::before, .paper-page-label::after{\n    content: \"\"; width: 40px; height: 1px; background: var(--border-2);\n  }\n\n  /* Toast */\n  .toast{\n    position: fixed; bottom: 24px; left: 50%;\n    transform: translateX(-50%) translateY(20px);\n    background: var(--card); color: var(--text);\n    border: 1px solid var(--gold);\n    padding: 10px 18px; border-radius: 999px;\n    box-shadow: var(--shadow);\n    opacity: 0; pointer-events: none;\n    transition: opacity .2s, transform .2s;\n    z-index: 100; font-size: 13px;\n  }\n  .toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }\n\n  /* Modal */\n  .modal-overlay{\n    position: fixed; inset: 0; background: rgba(0,0,0,.6);\n    display: none; align-items: center; justify-content: center; z-index: 200;\n  }\n  .modal-overlay.show{ display: flex; }\n  .modal{\n    background: var(--card); border: 1px solid var(--border);\n    border-radius: var(--radius); padding: 24px;\n    width: min(440px, 90vw);\n    box-shadow: var(--shadow);\n  }\n  .modal h3{ margin: 0 0 8px; }\n  .modal p{ color: var(--text-2); margin: 0 0 18px; }\n  .modal .modal-actions{ display: flex; justify-content: flex-end; gap: 10px; }\n\n  /* ============================================================\n     PRINT SHEETS (hidden on screen, shown on print)\n     ============================================================ */\n  .print-root{ display: none; }\n\n  /* ============================================================\n     PRINT STYLES\n     ============================================================ */\n  @page{ size: A4 portrait; margin: 18mm 16mm; }\n  @media print{\n    html, body {\n      height: auto !important;\n      overflow: visible !important;\n    }\n    body{ background: #fff; color: #000; font-family: \u0027Times New Roman\u0027, Georgia, serif; font-size: 11pt; }\n    .app{ display: none !important; }\n    .print-root{ display: block !important; }\n    .toast, .modal-overlay{ display: none !important; }\n  }\n\n  /* Mobile Print Preview styles */\n  #print-preview-modal-body .sheet {\n    background: #fff;\n    color: #111;\n    padding: 20mm 15mm;\n    margin: 10px auto;\n    width: 210mm;\n    min-height: 297mm;\n    font-family: \u0027Times New Roman\u0027, Georgia, serif;\n    font-size: 11pt;\n    line-height: 1.4;\n    box-shadow: 0 4px 15px rgba(0,0,0,.45);\n    box-sizing: border-box;\n    page-break-after: always;\n  }\n  #print-preview-modal-body .sheet.landscape {\n    width: 297mm;\n    min-height: 210mm;\n  }\n  #print-preview-modal-body .sheet:last-child {\n    page-break-after: auto;\n  }\n  \n  @media (max-width: 768px) {\n    #print-preview-modal-body {\n      display: flex;\n      flex-direction: column;\n      align-items: flex-start;\n      gap: 15px;\n    }\n    #print-preview-modal-body .sheet {\n      margin: 0;\n    }\n  }\n\n  /* ============================================================\n     PRINT SHEET LAYOUT (used in screen preview AND print)\n     ============================================================ */\n  .sheet{\n    font-family: \u0027Times New Roman\u0027, Georgia, serif;\n    color: #000;\n    page-break-after: always;\n  }\n  .sheet:last-child{ page-break-after: auto; }\n  .kop{\n    text-align: center;\n    border-bottom: 3px double #000;\n    padding-bottom: 8px; margin-bottom: 14px;\n    display: flex; align-items: center; gap: 14px;\n  }\n  .kop .kop-logo{\n    width: 84px; height: 84px; flex: 0 0 84px;\n    object-fit: contain;\n  }\n  .kop .kop-text{ flex: 1; text-align: center; }\n  .kop .kop-text .l1{ font-size: 11pt; font-weight: 700; }\n  .kop .kop-text .l2{ font-size: 11pt; font-weight: 700; }\n  .kop .kop-text .l3{ font-size: 11pt; font-weight: 700; }\n  .kop .kop-text .l4{ font-size: 13pt; font-weight: 700; letter-spacing: .02em; }\n  .kop .kop-text .l5{ font-size: 10pt; margin-top: 2px; }\n  .kop .kop-text .l6{ font-size: 9pt; }\n  .kop-pad{ width: 84px; flex: 0 0 84px; } /* balance */\n\n  .doc-title{\n    text-align: center; font-weight: 700;\n    text-decoration: underline;\n    margin: 12px 0 4px;\n    font-size: 12pt;\n  }\n  .doc-subtitle{\n    text-align: center; font-size: 11pt; margin-bottom: 12px;\n  }\n\n  .doc-table{\n    width: 100%; border-collapse: collapse; font-size: 10pt;\n  }\n  .doc-table th, .doc-table td{\n    border: 1px solid #000; padding: 4px 6px; vertical-align: top;\n  }\n  .doc-table th{ background: #EEE; font-weight: 700; text-align: center; }\n  .num{ text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }\n  .ctr{ text-align: center; }\n  .ttd-cell{ text-align: left; vertical-align: top; padding: 4px 6px; height: 56px; }\n\n  .ttd-grid{\n    display: grid; grid-template-columns: 1fr 1fr; gap: 28px;\n    margin-top: 28px; page-break-inside: avoid;\n  }\n  .ttd{ text-align: center; }\n  .ttd .role{ font-weight: 400; margin-bottom: 64px; }\n  .ttd .name{ font-weight: 700; text-decoration: underline; }\n  .ttd .nip{ font-weight: 400; }\n\n  .terbilang{ font-style: italic; }\n\n  /* Landscape sheet (Nominatif) */\n  .sheet.landscape{ /* handled via page rule below */ }\n  @media print{\n    .sheet.landscape{ page: landscape; }\n  }\n  @page landscape{ size: A4 landscape; margin: 12mm 10mm; }\n\n  /* Footer responsiveness */\n  @media (max-width: 900px){\n    .g-3, .g-4, .g-6{ grid-template-columns: repeat(2, minmax(0,1fr)); }\n    .col-3, .col-4, .col-6{ grid-column: span 2; }\n    .pegawai-totals{ grid-template-columns: repeat(2, 1fr); }\n  }\n\u003c/style\u003e\n\u003c/head\u003e\n\u003cbody\u003e\n\n\u003c!-- ============================================================\n     SCREEN APP\n     ============================================================ --\u003e\n\u003cdiv class=\"app\" id=\"app\"\u003e\n\n  \u003cheader class=\"topbar\"\u003e\n    \u003cimg class=\"crest\" src=\"4e9b82d6-5ca9-4f6b-bdcc-22ba73f2ca1b\" alt=\"Logo Imigrasi\"\u003e\n    \u003cdiv class=\"titles\"\u003e\n      \u003ch1\u003eSISTEM \u003cspan class=\"accent\"\u003eRINCIAN SPD\u003c/span\u003e\u003c/h1\u003e\n      \u003cdiv class=\"sub\"\u003eImigrasi 2026 · Kantor Imigrasi Kelas I TPI Pontianak\u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"meta\"\u003e\n      \u003cdiv\u003eTAHUN ANGGARAN \u003cstrong\u003e2026\u003c/strong\u003e\u003c/div\u003e\n      \u003cdiv\u003ev 1.0\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/header\u003e\n\n  \u003cnav class=\"tabs\" role=\"tablist\"\u003e\n    \u003cbutton class=\"tab active\" data-tab=\"pengisian\" role=\"tab\"\u003e\u003cspan class=\"dot\"\u003e\u003c/span\u003ePengisian\u003c/button\u003e\n    \u003cbutton class=\"tab\" data-tab=\"dpr\" role=\"tab\"\u003e\u003cspan class=\"dot\"\u003e\u003c/span\u003eDPR PIC\u003c/button\u003e\n  \u003c/nav\u003e\n\n  \u003cmain class=\"main\"\u003e\n\n    \u003c!-- ========== VIEW: PENGISIAN ========== --\u003e\n    \u003csection class=\"view active\" id=\"view-pengisian\"\u003e\n\n      \u003c!-- Section A: Data Kegiatan --\u003e\n      \u003cdiv class=\"section\"\u003e\n        \u003cdiv class=\"section-head\"\u003e\n          \u003cdiv class=\"num\"\u003eA\u003c/div\u003e\n          \u003ch2\u003eData Kegiatan · Header SPD\u003c/h2\u003e\n          \u003cdiv class=\"hint\"\u003eWajib dilengkapi sebelum cetak\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"section-body\"\u003e\n          \u003cdiv class=\"grid g-6\"\u003e\n            \u003cdiv class=\"field col-6\"\u003e\n              \u003clabel\u003eJudul Kegiatan \u003cspan class=\"req\"\u003e*\u003c/span\u003e\u003c/label\u003e\n              \u003ctextarea data-h=\"judulKegiatan\" rows=\"2\" placeholder=\"MELAKUKAN KEGIATAN KOORDINASI TERKAIT…\"\u003e\u003c/textarea\u003e\n            \u003c/div\u003e\n\n            \u003cdiv class=\"field col-2\"\u003e\n              \u003clabel\u003eNomor SPT \u003cspan class=\"req\"\u003e*\u003c/span\u003e\u003c/label\u003e\n              \u003cinput data-h=\"nomorSPT\" type=\"text\" placeholder=\"WIM.16.IMI.1-TI.04.01-…\"\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"field col-2\"\ a:\"SAULINA SIMORANGKIR, S.S.\", nip:\"19800803 200912 2 001\", pangkat:\"PENATA TK. I / (III/d)\", jabatan:\"KASUBSI REGISTRASI\" },\n  { nama:\"YAKUB SAPUTRA SIMANJUNTAK, S.P.\", nip:\"19830521 200604 1 001\", pangkat:\"PENATA TK. I / (III/d)\", jabatan:\"KASUBSI KETERTIBAN\" },\n  { nama:\"FITRIADI TULUS\", nip:\"19680516 199003 1 003\", pangkat:\"PENATA MUDA Tk. I / (III/b)\", jabatan:\"KASUBSI ADMINISTRASI DAN PELAPORAN\" },\n  { nama:\"TARMUJI\", nip:\"19680727 199103 1 002\", pangkat:\"PENATA MUDA Tk. I / (III/b)\", jabatan:\"KASUBSI KESEHATAN\" },\n  { nama:\"HARYANTO\", nip:\"19711104 199103 1 001\", pangkat:\"PENATA MUDA Tk. I / (III/b)\", jabatan:\"KASUBSI PERAWATAN\" },\n  { nama:\"TEDY SUMPONO\", nip:\"19810907 200501 1 001\", pangkat:\"PENATA MUDA TK. I / (III/b)\", jabatan:\"KASUBSI KEAMANAN\" },\n  { nama:\"HARDIAN RAMADHANA SESTYANTO, S.H.\", nip:\"19880425 201212 1 003\", pangkat:\"PENATA MUDA TK. I / (III/b)\", jabatan:\"KAUR KEUANGAN\" },\n  { nama:\"GORGA ARISANDY SIREGAR, S.Kom.\", nip:\"19920703 201712 1 001\", pangkat:\"PENATA MUDA TK. I / (III/b)\", jabatan:\"KAUR KEPEGAWAIAN\" },\n  { nama:\"IRWANSYAH, S.H.\", nip:\"19701017 199703 1 001\", pangkat:\"PENATA TK. I / (III/d)\", jabatan:\"PENYUSUN LAPORAN DAN HASIL EVALUASI\" },\n  { nama:\"MUHAMMAD IQBAL, A.Md.Im., S.H., M.Si.\", nip:\"19840930 200312 1 002\", pangkat:\"PENATA TK. I / (III/d)\", jabatan:\"ANALIS PENGELOLAAN KEUANGAN APBN AHLI MUDA\" },\n  { nama:\"AGUS DINARIA, S.H.\", nip:\"19870806 200604 2 001\", pangkat:\"PENATA TK. I / (III/d)\", jabatan:\"PENYUSUN RENCANA KERJA \u0026 ANGGARAN\" },\n  { nama:\"WIRA PRATAMA ELVIRA PUTRI, S.ST.\", nip:\"19871207 200903 2 003\", pangkat:\"PENATA TK. I / (III/d)\", jabatan:\"PENGOLAH DATA KESEHATAN\" },\n  { nama:\"MUHAMMAD FAJAR WAHYUDI, A.Md.\", nip:\"19831005 200901 1 015\", pangkat:\"PENATA / (III/c)\", jabatan:\"PENGELOLA DATA KEAMANAN DAN KETERTIBAN\" },\n  { nama:\"HILMAN FIRDAUS, S.Kom.\", nip:\"19870306 200901 1 002\", pangkat:\"PENATA / (III/c)\", jabatan:\"PENYUSUN LAPORAN DAN HASIL EVALUASI\" },\n  { nama:\"M. IRWANTO RAHMAWAN\", nip:\"19760108 200112 1 001\", pangkat:\"PENATA MUDA Tk. I / (III/b)\", jabatan:\"PENGELOLA KEAMANAN DAN KETERTIBAN\" },\n  { nama:\"YUSDIAWAN\", nip:\"19770530 200212 1 001\", pangkat:\"PENATA MUDA Tk. I / (III/b)\", jabatan:\"PENGOLAH DATA LAPORAN KEAMANAN DAN KETERTIBAN\" },\n  { nama:\"GALIH NOFRIO NANDA, S.IP.\", nip:\"19841109 201712 1 001\", pangkat:\"PENATA MUDA Tk. I / (III/b)\", jabatan:\"ANALIS KEIMIGRASIAN PERTAMA\" },\n  { nama:\"CHANDRA HADINATA, S.E.\", nip:\"19910117 201503 1 004\", pangkat:\"PENATA MUDA TK. I / (III/b)\", jabatan:\"PENGELOLA DATA\" },\n  { nama:\"ARIANDI, S.H.\", nip:\"19880119 200801 1 001\", pangkat:\"PENATA MUDA / (III/a)\", jabatan:\"KOMANDAN JAGA PEMASYARAKATAN/KEIMIGRASIAN\" },\n  { nama:\"AGUNG SUPRABOWO, A.Md.Kep.\", nip:\"19900214 201503 1 006\", pangkat:\"PENATA MUDA / (III/a)\", jabatan:\"KOMANDAN JAGA PEMASYARAKATAN/KEIMIGRASIAN\" },\n  { nama:\"WAN RHOMA DONNY, A.Md.\", nip:\"19900420 201503 1 002\", pangkat:\"PENATA MUDA / (III/a)\", jabatan:\"PENGELOLA DATA KEPEGAWAIAN\" },\n  { nama:\"MOCHAMAD HENDRO TRIYONO, A.Md.\", nip:\"19900816 201503 1 003\", pangkat:\"PENATA MUDA / (III/a)\", jabatan:\"PENGOLAH DATA LAPORAN\" },\n  { nama:\"DEWA GEDE GUNA SUWASTAWA, A.Md.\", nip:\"19930822 201712 1 001\", pangkat:\"PENATA MUDA / (III/a)\", jabatan:\"PEMERIKSA KEIMIGRASIAN MAHIR\" },\n  { nama:\"JANUARTI TRI NINGSIH, S.H.\", nip:\"19940115 201212 2 001\", pangkat:\"PENATA MUDA / (III/a)\", jabatan:\"PENGOLAH BAHAN EVALUASI DAN PELAPORAN\" }\n];\n\n/* ================================================================\n   STATE\n   ================================================================ */\nconst STORAGE_KEY = \"spd-imigrasi-2026\";\n\nconst defaultHeader = {\n  judulKegiatan: \"\",\n  nomorSPT: \"\",\n  tanggalSPT: \"\",\n  namaProgram: \"\",\n  tanggalKegiatan: \"\",\n  tujuanKota: \"\",\n  namaPPK: \"\",\n  nipPPK: \"\",\n  jabatanPPK: \"\",\n  namaBendahara: \"\",\n  nipBendahara: \"\",\n  kotaTerbit: \"Pontianak\",\n  kodeAnggaran: \"\"\n};\n\nconst blankPegawai = () =\u003e ({\n  nama:\"\", nip:\"\", golongan:\"III\", jabatan:\"\", tujuan:\"\",\n  noSPD:\"\", tanggalSPD:\"\", tanggalPelaksanaan:\"\",\n  tglMulai:\"\", tglSelesai:\"\",\n  lamaHari:1, uangHarian:0,\n  maskapaiPergi:\"\", tiketPergi:0,\n  maskapaiPulang:\"\", tiketPulang:0,\n  taksi:0, taksiDaerah:0, transportKab:0,\n  penginapan:0, representasi:0,\n  rekening:\"\",\n  buktiTiket:\"Bukti Terlampir\",\n  buktiUangHarian:\"Tidak Ada Bukti\",\n  buktiPenginapan:\"Bukti Terlampir\",\n  buktiTaksi:\"Bukti Terlampir\",\n  buktiTaksiDaerah:\"Bukti Terlampir\",\n  buktiTransportKab:\"Tidak Ada Bukti\",\n  buktiRepresentasi:\"Tidak Ada Bukti\"\n});\n\nconst defaultDPR = {\n  namaTtd:\"\", nipTtd:\"\", jabatanTtd:\"\", kotaTtd:\"Pontianak\",\n  tanggalSurat:\"\", tanggalCetak:\"\", nomorSurat:\"\", namaPenerima:\"\",\n  g1: {\n    baris1:\"\", baris2:\"\", kategori:\"BELANJA BARANG NON OPERASIONAL LAINNYA\", kode:\"\",\n    items:[ blankDPRItem() ]\n  },\n  g2: {\n    baris1:\"\", baris2:\"\", kategori:\"BELANJA SEWA\", kode:\"\",\n    items:[ blankDPRItem() ]\n  }\n};\nfunction blankDPRItem(){\n  return { uraian:\"\", qty1:1, sat1:\"Org\", qty2:1, sat2:\"Hari\", tarif:0, ket:\"\" };\n}\n\nconst state = {\n  header: { ...defaultHeader },\n  pegawai: [ blankPegawai() ],\n  dpr: JSON.parse(JSON.stringify(defaultDPR))\n};\n\n/* ================================================================\n   UTILITIES\n   ================================================================ */\nfunction formatRupiah(n){\n  n = Number(n)||0;\n  return new Intl.NumberFormat(\u0027id-ID\u0027,{style:\u0027currency\u0027,currency:\u0027IDR\u0027,minimumFractionDigits:0}).format(n);\n}\n\nfunction num(v){ const n = Number(v); return isFinite(n)?n:0; }\n\nconst angkaSatuan = [\"\",\"SATU\",\"DUA\",\"TIGA\",\"EMPAT\",\"LIMA\",\"ENAM\",\"TUJUH\",\"DELAPAN\",\"SEMBILAN\",\"SEPULUH\",\"SEBELAS\"];\nfunction terbilangCore(n){\n  n = Math.floor(Math.abs(n));\n  if (n \u003c 12) return angkaSatuan[n];\n  if (n \u003c 20) return terbilangCore(n-10) + \" BELAS\";\n  if (n \u003c 100) return terbilangCore(Math.floor(n/10)) + \" PULUH\" + (n%10? \" \"+terbilangCore(n%10):\"\");\n  if (n \u003c 200) return \"SERATUS\" + (n-100? \" \"+terbilangCore(n-100):\"\");\n  if (n \u003c 1000) return terbilangCore(Math.floor(n/100)) + \" RATUS\" + (n%100? \" \"+terbilangCore(n%100):\"\");\n  if (n \u003c 2000) return \"SERIBU\" + (n-1000? \" \"+terbilangCore(n-1000):\"\");\n  if (n \u003c 1000000) return terbilangCore(Math.floor(n/1000)) + \" RIBU\" + (n%1000? \" \"+terbilangCore(n%1000):\"\");\n  if (n \u003c 1000000000) return terbilangCore(Math.floor(n/1000000)) + \" JUTA\" + (n%1000000? \" \"+terbilangCore(n%1000000):\"\");\n  if (n \u003c 1000000000000) return terbilangCore(Math.floor(n/1000000000)) + \" MILIAR\" + (n%1000000000? \" \"+terbilangCore(n%1000000000):\"\");\n  return terbilangCore(Math.floor(n/1000000000000)) + \" TRILIUN\" + (n%1000000000000? \" \"+terbilangCore(n%1000000000000):\"\");\n}\nfunction terbilang(n){\n  n = Number(n)||0;\n  if (n === 0) return \"NOL RUPIAH\";\n  return (terbilangCore(n).replace(/\\s+/g,\" \").trim()) + \" RUPIAH\";\n}\n\nfunction lamaHariTeks(n){\n  n = Math.max(0, Math.floor(Number(n)||0));\n  const huruf = [\"nol\",\"satu\",\"dua\",\"tiga\",\"empat\",\"lima\",\"enam\",\"tujuh\",\"delapan\",\"sembilan\",\"sepuluh\",\"sebelas\",\"dua belas\",\"tiga belas\",\"empat belas\",\"lima belas\"];\n  const t = huruf[n] || String(n);\n  return `${n} (${t}) hari`;\n}\n\nconst bulanID = [\"Januari\",\"Februari\",\"Maret\",\"April\",\"Mei\",\"Juni\",\"Juli\",\"Agustus\",\"September\",\"Oktober\",\"November\",\"Desember\"];\nfunction formatTanggalID(tgl){\n  if (!tgl) return \"\";\n  // accept yyyy-mm-dd\n  const m = String(tgl).match(/^(\\d{4})-(\\d{2})-(\\d{2})/);\n  if (!m) return tgl;\n  const y = +m[1], mo = +m[2], d = +m[3];\n  return `${d} ${bulanID[mo-1]} ${y}`;\n}\nfunction parseTgl(tgl){\n  const m = String(tgl||\"\").match(/^(\\d{4})-(\\d{2})-(\\d{2})/);\n  if (!m) return null;\n  return { y:+m[1], mo:+m[2], d:+m[3] };\n}\nfunction formatRangeID(mulai, selesai){\n  const a = parseTgl(mulai), b = parseTgl(selesai);\n  if (!a \u0026\u0026 !b) return \"\";\n  if (a \u0026\u0026 !b) return formatTanggalID(mulai);\n  if (!a \u0026\u0026 b) return formatTanggalID(selesai);\n  if (a.y===b.y \u0026\u0026 a.mo===b.mo) return `${a.d} sd ${b.d} ${bulanID[a.mo-1]} ${a.y}`;\n  if (a.y===b.y) return `${a.d} ${bulanID[a.mo-1]} sd ${b.d} ${bulanID[b.mo-1]} ${a.y}`;\n  return `${formatTanggalID(mulai)} sd ${formatTanggalID(selesai)}`;\n}\nfunction hitungLamaHari(mulai, selesai){\n  const a = parseTgl(mulai), b = parseTgl(selesai);\n  if (!a || !b) return null;\n  const da = new Date(a.y, a.mo-1, a.d), db = new Date(b.y, b.mo-1, b.d);\n  const diff = Math.round((db - da) / 86400000) + 1;\n  return diff \u003e 0 ? diff : 1;\n}\nfunction tglPelaksanaanText(p){\n  const r = formatRangeID(p.tglMulai, p.tglSelesai);\n  return r || p.tanggalPelaksanaan || \"\";\n}\n\nfunction totalsForPegawai(p){\n  const tiketPP = num(p.tiketPergi) + num(p.tiketPulang);\n  const uangHarianTotal = num(p.uangHarian) * num(p.lamaHari);\n  const grand = tiketPP + num(p.taksi) + num(p.taksiDaerah) + num(p.transportKab) + uangHarianTotal + num(p.penginapan) + num(p.representasi);\n  return { tiketPP, uangHarianTotal, grand };\n}\n\nfunction totalsAll(){\n  let tiket=0, taksi=0, taksiDaerah=0, transport=0, uh=0, penginapan=0, repr=0, grand=0;\n  state.pegawai.forEach(p=\u003e{\n    const t = totalsForPegawai(p);\n    tiket += t.tiketPP; taksi += num(p.taksi); taksiDaerah += num(p.taksiDaerah);\n    transport += num(p.transportKab); uh += t.uangHarianTotal;\n    penginapan += num(p.penginapan); repr += num(p.representasi); grand += t.grand;\n  });\n  return { tiket, taksi, taksiDaerah, transport, uh, penginapan, repr, grand };\n}\n\n/* ================================================================\n   STORAGE\n   ================================================================ */\nfunction save(){\n  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}\n}\nfunction load(){\n  try{\n    const raw = localStorage.getItem(STORAGE_KEY);\n    if (!raw) return false;\n    const obj = JSON.parse(raw);\n    if (obj \u0026\u0026 obj.header \u0026\u0026 Array.isArray(obj.pegawai)){\n      state.header = { ...defaultHeader, ...obj.header };\n      state.pegawai = obj.pegawai.length? obj.pegawai.map(p=\u003e({...blankPegawai(),...p})) : [blankPegawai()];\n      if (obj.dpr){\n        const d = obj.dpr;\n        state.dpr = {\n          ...JSON.parse(JSON.stringify(defaultDPR)),\n          ...d,\n          g1: { ...defaultDPR.g1, ...(d.g1||{}), items: (d.g1\u0026\u0026d.g1.items\u0026\u0026d.g1.items.length)? d.g1.items.map(x=\u003e({...blankDPRItem(),...x})) : [blankDPRItem()] },\n          g2: { ...defaultDPR.g2, ...(d.g2||{}), items: (d.g2\u0026\u0026d.g2.items\u0026\u0026d.g2.items.length)? d.g2.items.map(x=\u003e({...blankDPRItem(),...x})) : [blankDPRItem()] }\n        };\n      }\n      return true;\n    }\n  }catch(e){}\n  return false;\n}\n\n/* ================================================================\n   TOAST + MODAL\n   ================================================================ */\nconst toastEl = document.getElementById(\u0027toast\u0027);\nlet toastTimer;\nfunction toast(msg){\n  toastEl.textContent = msg;\n  toastEl.classList.add(\u0027show\u0027);\n  clearTimeout(toastTimer);\n  toastTimer = setTimeout(()=\u003etoastEl.classList.remove(\u0027show\u0027), 2200);\n}\n\nconst modalEl = document.getElementById(\u0027modal\u0027);\nfunction confirmModal({title, body, okText=\"Hapus\", cancelText=\"Batal\", danger=true}){\n  return new Promise(resolve=\u003e{\n    document.getElementById(\u0027modal-title\u0027).textContent = title;\n    document.getElementById(\u0027modal-body\u0027).textContent = body;\n    const ok = document.getElementById(\u0027modal-ok\u0027); const cancel = document.getElementById(\u0027modal-cancel\u0027);\n    ok.textContent = okText; cancel.textContent = cancelText;\n    ok.className = \"btn \" + (danger?\"btn-danger\":\"btn-primary\");\n    modalEl.classList.add(\u0027show\u0027);\n    const cleanup = (val)=\u003e{ modalEl.classList.remove(\u0027show\u0027); ok.onclick=null; cancel.onclick=null; resolve(val); };\n    ok.onclick = ()=\u003ecleanup(true);\n    cancel.onclick = ()=\u003ecleanup(false);\n    modalEl.onclick = (e)=\u003e{ if(e.target===modalEl) cleanup(false); };\n  });\n}\n\n/* ================================================================\n   TABS\n   ================================================================ */\ndocument.querySelectorAll(\u0027.tab\u0027).forEach(t=\u003e{\n  t.addEventListener(\u0027click\u0027, ()=\u003e{\n    document.querySelectorAll(\u0027.tab\u0027).forEach(x=\u003ex.classList.remove(\u0027active\u0027));\n    document.querySelectorAll(\u0027.view\u0027).forEach(x=\u003ex.classList.remove(\u0027active\u0027));\n    t.classList.add(\u0027active\u0027);\n    document.getElementById(\u0027view-\u0027+t.dataset.tab).classList.add(\u0027active\u0027);\n    if (t.dataset.tab === \u0027dpr\u0027) renderDPR();\n  });\n});\n\n/* ================================================================\n   HEADER FORM BINDING\n   ================================================================ */\nfunction bindHeader(){\n  document.querySelectorAll(\u0027[data-h]\u0027).forEach(el=\u003e{\n    const key = el.dataset.h;\n    el.value = state.header[key] ?? \"\";\n    el.addEventListener(\u0027input\u0027, ()=\u003e{\n      state.header[key] = el.value;\n      // If PPK name matches a daftarPegawai entry, autofill NIP \u0026 Jabatan\n      if (key === \u0027namaPPK\u0027) autoFillPPK(el.value);\n      if (key === \u0027namaBendahara\u0027) autoFillBendahara(el.value);\n      save();\n      // refresh tujuan default for empty pegawai rows\n      if (key === \u0027tujuanKota\u0027){ refreshPegawaiTujuanPlaceholders(); }\n    });\n  });\n}\nfunction autoFillPPK(name){\n  const m = daftarPegawai.find(p=\u003ep.nama===name);\n  if (m){\n    state.header.nipPPK = m.nip;\n    state.header.jabatanPPK = m.jabatan;\n    document.querySelector(\u0027[data-h=\"nipPPK\"]\u0027).value = m.nip;\n    document.querySelector(\u0027[data-h=\"jabatanPPK\"]\u0027).value = m.jabatan;\n    save();\n  }\n}\nfunction autoFillBendahara(name){\n  const m = daftarPegawai.find(p=\u003ep.nama===name);\n  if (m){\n    state.header.nipBendahara = m.nip;\n    document.querySelector(\u0027[data-h=\"nipBendahara\"]\u0027).value = m.nip;\n    save();\n  }\n}\nfunction refreshPegawaiTujuanPlaceholders(){\n  document.querySelectorAll(\u0027[data-p-field=\"tujuan\"]\u0027).forEach(inp=\u003e{\n    inp.placeholder = state.header.tujuanKota || \"Tujuan kota\";\n  });\n}\n\n/* ================================================================\n   PEGAWAI LIST RENDER\n   ================================================================ */\nconst peListEl = document.getElementById(\u0027pegawai-list\u0027);\nconst peCountEl = document.getElementById(\u0027pegawai-count\u0027);\n\nfunction pegawaiRowHTML(i){\n  return `\n    \u003cdiv class=\"pegawai-card\" data-i=\"${i}\"\u003e\n      \u003cdiv class=\"pegawai-head\"\u003e\n        \u003cdiv class=\"badge\"\u003e${i+1}\u003c/div\u003e\n        \u003cdiv class=\"name\" data-role=\"name-display\"\u003e\u003cspan class=\"placeholder\"\u003ePegawai baru — pilih nama\u003c/span\u003e\u003c/div\u003e\n        \u003cdiv class=\"actions\"\u003e\n          \u003cbutton class=\"btn btn-ghost btn-sm\" data-act=\"print-one\"\u003e🖨️ Cetak Rincian\u003c/button\u003e\n          \u003cbutton class=\"btn btn-danger btn-sm\" data-act=\"remove\"\u003e✕ Hapus\u003c/button\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"pegawai-body\"\u003e\n        \u003cdiv class=\"grid g-6\"\u003e\n          \u003cdiv class=\"field col-3\"\u003e\n            \u003clabel\u003eNama Lengkap \u003cspan class=\"req\"\u003e*\u003c/span\u003e\u003c/label\u003e\n            \u003cinput data-p-field=\"nama\" type=\"text\" list=\"dl-pegawai-nama\" placeholder=\"Ketik atau pilih dari daftar\" /\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"field col-2\"\u003e\n            \u003clabel\u003eNIP \u003cspan class=\"req\"\u003e*\u003c/span\u003e\u003c/label\u003e\n            \u003cinput data-p-field=\"nip\" type=\"text\" placeholder=\"auto-isi dari daftar\" /\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"field\"\u003e\n            \u003clabel\u003eGolongan\u003c/label\u003e\n            \u003cselect data-p-field=\"golongan\"\u003e\n              \u003coption value=\"II\"\u003eII\u003c/option\u003e\n              \u003coption value=\"III\" selected\u003eIII\u003c/option\u003e\n              \u003coption value=\"IV\"\u003eIV\u003c/option\u003e\n            \u003c/select\u003e\n          \u003c/div\u003e\n\n          \u003cdiv class=\"field col-6\"\u003e\n            \u003clabel\u003eJabatan\u003c/label\u003e\n            \u003cinput data-p-field=\"jabatan\" type=\"text\" /\u003e\n          \u003c/div\u003e\n\n          \u003cdiv class=\"field col-2\"\u003e\n            \u003clabel\u003eTujuan\u003c/label\u003e\n            \u003cinput data-p-field=\"tujuan\" type=\"text\" /\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"field col-2\"\u003e\n            \u003clabel\u003eNomor SPD \u003cspan class=\"req\"\u003e*\u003c/span\u003e\u003c/label\u003e\n            \u003cinput data-p-field=\"noSPD\" type=\"text\" placeholder=\"WIM.16.IMI.1-KU.03.01-…\" /\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"field col-2\"\u003e\n            \u003clabel\u003eTanggal SPD \u003cspan class=\"req\"\u003e*\u003c/span\u003e\u003c/label\u003e\n            \u003cinput data-p-field=\"tanggalSPD\" type=\"date\" /\u003e\n          \u003c/div\u003e\n\n          \u003cdiv class=\"field col-2\"\u003e\n            \u003clabel\u003eTanggal Mulai\u003c/label\u003e\n            \u003cinput data-p-field=\"tglMulai\" type=\"date\" /\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"field col-2\"\u003e\n            \u003clabel\u003eTanggal Selesai\u003c/label\u003e\n            \u003cinput data-p-field=\"tglSelesai\" type=\"date\" /\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"field\"\u003e\n            \u003clabel\u003eLama Hari \u003cspan style=\"color:var(--text-3)\"\u003e(auto)\u003c/span\u003e\u003c/label\u003e\n            \u003cinput data-p-field=\"lamaHari\" type=\"number\" min=\"0\" value=\"1\" /\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"field col-2\"\u003e\n            \u003clabel\u003eUang Harian (Rp/hari)\u003c/label\u003e\n            \u003cinput data-p-field=\"uangHarian\" type=\"number\" min=\"0\" step=\"1000\" placeholder=\"530000\" /\u003e\n          \u003c/div\u003e\n\n          \u003cdiv class=\"field col-3\"\u003e\n            \u003clabel\u003eMaskapai Pergi\u003c/label\u003e\n            \u003cinput data-p-field=\"maskapaiPergi\" type=\"text\" placeholder=\"Batik Air (PNK - CGK)\" /\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"field col-3\"\u003e\n            \u003clabel\u003eHarga Tiket Pergi (Rp)\u003c/label\u003e\n            \u003cinput data-p-field=\"tiketPergi\" type=\"number\" min=\"0\" step=\"1000\" /\u003e\n          \u003c/div\u003e\n\n          \u003cdiv class=\"field col-3\"\u003e\n            \u003clabel\u003eMaskapai Pulang\u003c/label\u003e\n            \u003cinput data-p-field=\"maskapaiPulang\" type=\"text\" placeholder=\"Citilink (CGK - PNK)\" /\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"field col-3\"\u003e\n            \u003clabel\u003eHarga Tiket Pulang (Rp)\u003c/label\u003e\n            \u003cinput data-p-field=\"tiketPulang\" type=\"number\" min=\"0\" step=\"1000\" /\u003e\n          \u003c/div\u003e\n\n          \u003cdiv class=\"field col-2\"\u003e\n            \u003clabel\u003eTaksi (Rp)\u003c/label\u003e\n            \u003cinput data-p-field=\"taksi\" type=\"number\" min=\"0\" step=\"1000\" /\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"field col-2\"\u003e\n            \u003clabel\u003eTaksi Daerah (Rp)\u003c/label\u003e\n            \u003cinput data-p-field=\"taksiDaerah\" type=\"number\" min=\"0\" step=\"1000\" /\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"field col-2\"\u003e\n            \u003clabel\u003eTransport Antar Kab/Kota (Rp)\u003c/label\u003e\n            \u003cinput data-p-field=\"transportKab\" type=\"number\" min=\"0\" step=\"1000\" /\u003e\n          \u003c/div\u003e\n\n          \u003cdiv class=\"field col-2\"\u003e\n            \u003clabel\u003eBiaya Penginapan (Rp)\u003c/label\u003e\n            \u003cinput data-p-field=\"penginapan\" type=\"number\" min=\"0\" step=\"1000\" /\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"field col-2\"\u003e\n            \u003clabel\u003eUang Representasi (Rp)\u003c/label\u003e\n            \u003cinput data-p-field=\"representasi\" type=\"number\" min=\"0\" step=\"1000\" /\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"field col-2\"\u003e\n            \u003clabel\u003eNo. Rekening\u003c/label\u003e\n            \u003cinput data-p-field=\"rekening\" type=\"text\" placeholder=\"BPG 042 …\" /\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n\n        \u003cdiv class=\"bukti-block\"\u003e\n          \u003cdiv class=\"bukti-title\"\u003eStatus Bukti Pengeluaran\u003c/div\u003e\n          \u003cdiv class=\"grid g-4\"\u003e\n            \u003cdiv class=\"field\"\u003e\n              \u003clabel\u003eTiket Pesawat\u003c/label\u003e\n              \u003cselect data-p-field=\"buktiTiket\" data-bukti\u003e\n                \u003coption\u003eBukti Terlampir\u003c/option\u003e\u003coption\u003eTidak Ada Bukti\u003c/option\u003e\n              \u003c/select\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"field\"\u003e\n              \u003clabel\u003eUang Harian\u003c/label\u003e\n              \u003cselect data-p-field=\"buktiUangHarian\" data-bukti\u003e\n                \u003coption\u003eBukti Terlampir\u003c/option\u003e\u003coption\u003eTidak Ada Bukti\u003c/option\u003e\n              \u003c/select\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"field\"\u003e\n              \u003clabel\u003ePenginapan\u003c/label\u003e\n              \u003cselect data-p-field=\"buktiPenginapan\" data-bukti\u003e\n                \u003coption\u003eBukti Terlampir\u003c/option\u003e\u003coption\u003eTidak Ada Bukti\u003c/option\u003e\n              \u003c/select\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"field\"\u003e\n              \u003clabel\u003eTaksi\u003c/label\u003e\n              \u003cselect data-p-field=\"buktiTaksi\" data-bukti\u003e\n                \u003coption\u003eBukti Terlampir\u003c/option\u003e\u003coption\u003eTidak Ada Bukti\u003c/option\u003e\n              \u003c/select\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"field\"\u003e\n              \u003clabel\u003eTaksi Daerah\u003c/label\u003e\n              \u003cselect data-p-field=\"buktiTaksiDaerah\" data-bukti\u003e\n                \u003coption\u003eBukti Terlampir\u003c/option\u003e\u003coption\u003eTidak Ada Bukti\u003c/option\u003e\n              \u003c/select\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"field\"\u003e\n              \u003clabel\u003eTransport Antar Kab/Kota\u003c/label\u003e\n              \u003cselect data-p-field=\"buktiTransportKab\" data-bukti\u003e\n                \u003coption\u003eBukti Terlampir\u003c/option\u003e\u003coption\u003eTidak Ada Bukti\u003c/option\u003e\n              \u003c/select\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"field\"\u003e\n              \u003clabel\u003eUang Representasi\u003c/label\u003e\n              \u003cselect data-p-field=\"buktiRepresentasi\" data-bukti\u003e\n                \u003coption\u003eBukti Terlampir\u003c/option\u003e\u003coption\u003eTidak Ada Bukti\u003c/option\u003e\n              \u003c/select\u003e\n            \u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n\n        \u003cdiv class=\"pegawai-totals\" data-role=\"totals\"\u003e\n          \u003cdiv class=\"stat\"\u003e\u003cdiv class=\"k\"\u003eTotal Tiket PP\u003c/div\u003e\u003cdiv class=\"v\" data-t=\"tiket\"\u003eRp 0\u003c/div\u003e\u003c/div\u003e\n          \u003cdiv class=\"stat\"\u003e\u003cdiv class=\"k\"\u003eUang Harian × Lama\u003c/div\u003e\u003cdiv class=\"v\" data-t=\"uh\"\u003eRp 0\u003c/div\u003e\u003c/div\u003e\n          \u003cdiv class=\"stat\"\u003e\u003cdiv class=\"k\"\u003eLama Hari\u003c/div\u003e\u003cdiv class=\"v\" data-t=\"hari\"\u003e0 hari\u003c/div\u003e\u003c/div\u003e\n          \u003cdiv class=\"stat total\"\u003e\u003cdiv class=\"k\"\u003eTotal Per Pegawai\u003c/div\u003e\u003cdiv class=\"v\" data-t=\"grand\"\u003eRp 0\u003c/div\u003e\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n  `;\n}\n\nfunction bindPegawaiCard(card, i){\n  const p = state.pegawai[i];\n  // populate values\n  card.querySelectorAll(\u0027[data-p-field]\u0027).forEach(inp=\u003e{\n    const key = inp.dataset.pField;\n    inp.value = p[key] ?? \"\";\n  });\n  // tujuan placeholder/default\n  refreshPegawaiTujuanPlaceholders();\n\n  // input listeners\n  card.querySelectorAll(\u0027[data-p-field]\u0027).forEach(inp=\u003e{\n    const key = inp.dataset.pField;\n    inp.addEventListener(\u0027input\u0027, ()=\u003e{\n      let v = inp.value;\n      if (inp.type === \u0027number\u0027) v = inp.value === \"\"? 0 : Number(inp.value);\n      state.pegawai[i][key] = v;\n\n      // autofill from daftarPegawai\n      if (key === \u0027nama\u0027){\n        const m = daftarPegawai.find(x=\u003ex.nama===v);\n        if (m){\n          state.pegawai[i].nip = m.nip;\n          state.pegawai[i].jabatan = m.jabatan;\n          // golongan dari pangkat (III/d -\u003e III, etc.)\n          const gMatch = m.pangkat.match(/\\(([^)]+)\\)/);\n          if (gMatch){\n            const g = gMatch[1].split(\u0027/\u0027)[0].trim();\n            state.pegawai[i].golongan = g;\n            card.querySelector(\u0027[data-p-field=\"golongan\"]\u0027).value = g;\n          }\n          card.querySelector(\u0027[data-p-field=\"nip\"]\u0027).value = m.nip;\n          card.querySelector(\u0027[data-p-field=\"jabatan\"]\u0027).value = m.jabatan;\n        }\n      }\n      // default tujuan from header\n      if (key === \u0027tujuan\u0027 \u0026\u0026 v === \"\" \u0026\u0026 state.header.tujuanKota){\n        // leave placeholder\n      }\n      // auto-hitung lama hari dari rentang tanggal\n      if (key === \u0027tglMulai\u0027 || key === \u0027tglSelesai\u0027){\n        const lh = hitungLamaHari(state.pegawai[i].tglMulai, state.pegawai[i].tglSelesai);\n        if (lh != null){\n          state.pegawai[i].lamaHari = lh;\n          const lhInput = card.querySelector(\u0027[data-p-field=\"lamaHari\"]\u0027);\n          if (lhInput) lhInput.value = lh;\n        }\n      }\n      updateTotals(card, i);\n      updateNameDisplay(card, i);\n      save();\n    });\n  });\n\n  // action buttons\n  card.querySelector(\u0027[data-act=\"remove\"]\u0027).addEventListener(\u0027click\u0027, async ()=\u003e{\n    if (state.pegawai.length === 1){\n      toast(\"Minimal satu pegawai\");\n      return;\n    }\n    const ok = await confirmModal({title:\"Hapus pegawai?\", body:`Pegawai #${i+1} akan dihapus.`, okText:\"Hapus\"});\n    if (ok){\n      state.pegawai.splice(i,1);\n      save();\n      renderAllPegawai();\n    }\n  });\n  card.querySelector(\u0027[data-act=\"print-one\"]\u0027).addEventListener(\u0027click\u0027, ()=\u003eprintRincianOne(i));\n\n  updateTotals(card, i);\n  updateNameDisplay(card, i);\n}\n\nfunction updateTotals(card, i){\n  const p = state.pegawai[i];\n  const t = totalsForPegawai(p);\n  card.querySelector(\u0027[data-t=\"tiket\"]\u0027).textContent = formatRupiah(t.tiketPP);\n  card.querySelector(\u0027[data-t=\"uh\"]\u0027).textContent   = formatRupiah(t.uangHarianTotal);\n  card.querySelector(\u0027[data-t=\"hari\"]\u0027).textContent = lamaHariTeks(p.lamaHari);\n  card.querySelector(\u0027[data-t=\"grand\"]\u0027).textContent= formatRupiah(t.grand);\n}\nfunction updateNameDisplay(card, i){\n  const p = state.pegawai[i];\n  const el = card.querySelector(\u0027[data-role=\"name-display\"]\u0027);\n  if (p.nama){\n    el.innerHTML = `${p.nama} \u003cspan style=\"color:var(--text-3); font-weight:500; margin-left:8px;\"\u003e${p.nip||\"\"}\u003c/span\u003e`;\n  } else {\n    el.innerHTML = `\u003cspan class=\"placeholder\"\u003ePegawai baru — pilih nama\u003c/span\u003e`;\n  }\n}\n\nfunction renderAllPegawai(){\n  peListEl.innerHTML = state.pegawai.map((_,i)=\u003epegawaiRowHTML(i)).join(\"\");\n  peListEl.querySelectorAll(\u0027.pegawai-card\u0027).forEach((card,i)=\u003ebindPegawaiCard(card,i));\n  peCountEl.textContent = state.pegawai.length;\n  document.getElementById(\u0027btn-add-pegawai\u0027).disabled = state.pegawai.length \u003e= 10;\n}\n\ndocument.getElementById(\u0027btn-add-pegawai\u0027).addEventListener(\u0027click\u0027, ()=\u003e{\n  if (state.pegawai.length \u003e= 10){ toast(\"Maksimal 10 pegawai\"); return; }\n  const p = blankPegawai();\n  // inherit defaults from header\n  if (state.header.tujuanKota) p.tujuan = state.header.tujuanKota;\n  state.pegawai.push(p);\n  save();\n  renderAllPegawai();\n});\n\n/* Populate datalist */\nfunction fillDatalist(){\n  const dl = document.getElementById(\u0027dl-pegawai-nama\u0027);\n  dl.innerHTML = daftarPegawai.map(p=\u003e`\u003coption value=\"${p.nama}\"\u003e${p.jabatan}\u003c/option\u003e`).join(\"\");\n}\n\n/* ================================================================\n   ACTIONS BAR\n   ================================================================ */\ndocument.getElementById(\u0027btn-save\u0027).addEventListener(\u0027click\u0027, ()=\u003e{\n  save();\n  toast(\"✓ Data tersimpan\");\n});\ndocument.getElementById(\u0027btn-reset\u0027).addEventListener(\u0027click\u0027, async ()=\u003e{\n  const ok = await confirmModal({title:\"Reset form?\", body:\"Semua data form akan dikosongkan. Tindakan ini tidak bisa dibatalkan.\", okText:\"Reset\"});\n  if (ok){\n    state.header = { ...defaultHeader };\n    state.pegawai = [ blankPegawai() ];\n    state.dpr = JSON.parse(JSON.stringify(defaultDPR));\n    save();\n    bindHeader();\n    renderAllPegawai();\n    renderDPR();\n    toast(\"Form direset\");\n  }\n});\ndocument.getElementById(\u0027btn-loadexample\u0027).addEventListener(\u0027click\u0027, ()=\u003e{\n  Object.assign(state.header, contohData.header);\n  state.pegawai = contohData.pegawai.map(p=\u003e({...blankPegawai(),...p}));\n  if (contohData.dpr) state.dpr = JSON.parse(JSON.stringify(contohData.dpr));\n  save();\n  bindHeader();\n  renderAllPegawai();\n  renderDPR();\n  toast(\"Contoh data dimuat\");\n});\n\ndocument.getElementById(\u0027btn-print-nominatif\u0027).addEventListener(\u0027click\u0027, ()=\u003eprintNominatif());\ndocument.getElementById(\u0027btn-print-dpr\u0027).addEventListener(\u0027click\u0027, ()=\u003e{\n  // switch to DPR view + print both groups\n  document.querySelector(\u0027[data-tab=\"dpr\"]\u0027).click();\n  setTimeout(printDPRBoth, 80);\n});\ndocument.getElementById(\u0027btn-print-all\u0027).addEventListener(\u0027click\u0027, ()=\u003eprintAllRincian());\n\n/* DPR PIC tab buttons */\ndocument.getElementById(\u0027btn-dpr-save\u0027).addEventListener(\u0027click\u0027, ()=\u003e{ save(); toast(\"✓ Data DPR tersimpan\"); });\ndocument.getElementById(\u0027btn-dpr-print1\u0027).addEventListener(\u0027click\u0027, ()=\u003eprintDPRGroup(\u0027g1\u0027));\ndocument.getElementById(\u0027btn-dpr-print2\u0027).addEventListener(\u0027click\u0027, ()=\u003eprintDPRGroup(\u0027g2\u0027));\ndocument.getElementById(\u0027btn-dpr-printall\u0027).addEventListener(\u0027click\u0027, printDPRBoth);\ndocument.getElementById(\u0027btn-dpr-fromppk\u0027).addEventListener(\u0027click\u0027, ()=\u003e{\n  state.dpr.namaTtd = state.header.namaPPK;\n  state.dpr.nipTtd = state.header.nipPPK;\n  state.dpr.jabatanTtd = state.header.jabatanPPK;\n  state.dpr.kotaTtd = state.header.kotaTerbit || \"Pontianak\";\n  state.dpr.tanggalSurat = state.header.tanggalSPT;\n  state.dpr.nomorSurat = state.header.nomorSPT;\n  if (!state.dpr.namaPenerima) state.dpr.namaPenerima = state.header.namaPPK;\n  save(); bindDPRHeader(); toast(\"Data PPK disalin\");\n});\nconst dprPreviewShell = document.getElementById(\u0027dpr-preview-shell\u0027);\ndocument.getElementById(\u0027btn-dpr-preview\u0027).addEventListener(\u0027click\u0027, ()=\u003e{\n  dprPreviewShell.style.display = dprPreviewShell.style.display===\u0027none\u0027? \u0027block\u0027:\u0027none\u0027;\n  if (dprPreviewShell.style.display===\u0027block\u0027) renderDPRPreview();\n});\ndocument.getElementById(\u0027btn-dpr-preview-close\u0027).addEventListener(\u0027click\u0027, ()=\u003e{ dprPreviewShell.style.display=\u0027none\u0027; });\n\n/* ================================================================\n   VALIDATION (mark required empty fields red)\n   ================================================================ */\nfunction validateBeforePrint(){\n  let bad = 0;\n  document.querySelectorAll(\u0027.field\u0027).forEach(f=\u003ef.classList.remove(\u0027invalid\u0027));\n  // header required\n  const reqHeader = [\u0027judulKegiatan\u0027,\u0027nomorSPT\u0027,\u0027namaPPK\u0027,\u0027nipPPK\u0027];\n  reqHeader.forEach(k=\u003e{\n    if (!state.header[k]){\n      const el = document.querySelector(`[data-h=\"${k}\"]`);\n      if (el) el.closest(\u0027.field\u0027).classList.add(\u0027invalid\u0027);\n      bad++;\n    }\n  });\n  // pegawai required\n  state.pegawai.forEach((p,i)=\u003e{\n    [\u0027nama\u0027,\u0027nip\u0027,\u0027noSPD\u0027,\u0027tanggalSPD\u0027].forEach(k=\u003e{\n      if (!p[k]){\n        const card = document.querySelector(`.pegawai-card[data-i=\"${i}\"]`);\n        if (card){\n          const el = card.querySelector(`[data-p-field=\"${k}\"]`);\n          if (el) el.closest(\u0027.field\u0027).classList.add(\u0027invalid\u0027);\n        }\n        bad++;\n      }\n    });\n  });\n  if (bad\u003e0){\n    toast(`✗ ${bad} field wajib belum lengkap`);\n    return false;\n  }\n  return true;\n}\n\n/* ================================================================\n   PRINT — KOP \u0026 SHEETS\n   ================================================================ */\nfunction getLogoUrl(){\n  const crest = document.querySelector(\u0027.topbar .crest\u0027);\n  return crest \u0026\u0026 crest.src ? crest.src : \u0027\u0027;\n}\n\nfunction kopHTML(){\n  const logoSrc = getLogoUrl();\n  return `\n    \u003cdiv class=\"kop\"\u003e\n      ${logoSrc ? `\u003cimg class=\"kop-logo\" src=\"${logoSrc}\" alt=\"Logo\" /\u003e` : `\u003cdiv class=\"kop-pad\"\u003e\u003c/div\u003e`}\n      \u003cdiv class=\"kop-text\"\u003e\n        \u003cdiv class=\"l1\"\u003eKEMENTERIAN IMIGRASI DAN PEMASYARAKATAN REPUBLIK INDONESIA\u003c/div\u003e\n        \u003cdiv class=\"l2\"\u003eDIREKTORAT JENDERAL IMIGRASI\u003c/div\u003e\n        \u003cdiv class=\"l3\"\u003eKANTOR WILAYAH KALIMANTAN BARAT\u003c/div\u003e\n        \u003cdiv class=\"l4\"\u003eKANTOR IMIGRASI KELAS I TPI PONTIANAK\u003c/div\u003e\n        \u003cdiv class=\"l5\"\u003eJalan Letjen. Sutoyo No. 122 Pontianak 78121\u003c/div\u003e\n        \u003cdiv class=\"l6\"\u003eLaman: www.pontianak.imigrasi.go.id \u0026nbsp;|\u0026nbsp; Surel: keuangan.kanimptk@gmail.com\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"kop-pad\"\u003e\u003c/div\u003e\n    \u003c/div\u003e\n  `;\n}\n\nfunction sheetNominatifHTML(){\n  const h = state.header;\n  const tot = totalsAll();\n  const rows = state.pegawai.map((p,i)=\u003e{\n    const t = totalsForPegawai(p);\n    return `\n      \u003ctr\u003e\n        \u003ctd class=\"ctr\"\u003e${i+1}\u003c/td\u003e\n        \u003ctd\u003e\u003cb\u003e${p.nama||\"—\"}\u003c/b\u003e\u003cbr/\u003eNIP. ${p.nip||\"—\"}\u003c/td\u003e\n        \u003ctd class=\"ctr\"\u003e${p.golongan||\"\"}\u003c/td\u003e\n        \u003ctd\u003e${p.jabatan||\"\"}\u003c/td\u003e\n        \u003ctd\u003e${p.tujuan||h.tujuanKota||\"\"}\u003c/td\u003e\n        \u003ctd\u003e${tglPelaksanaanText(p)}\u003c/td\u003e\n        \u003ctd class=\"num\"\u003e${t.tiketPP? formatRupiah(t.tiketPP):\"-\"}\u003c/td\u003e\n        \u003ctd class=\"num\"\u003e${num(p.taksi)? formatRupiah(p.taksi):\"-\"}\u003c/td\u003e\n        \u003ctd class=\"num\"\u003e${num(p.taksiDaerah)? formatRupiah(p.taksiDaerah):\"-\"}\u003c/td\u003e\n        \u003ctd class=\"num\"\u003e${t.uangHarianTotal? formatRupiah(t.uangHarianTotal):\"-\"}\u003c/td\u003e\n        \u003ctd class=\"num\"\u003e${num(p.penginapan)? formatRupiah(p.penginapan):\"-\"}\u003c/td\u003e\n        \u003ctd class=\"num\"\u003e\u003cb\u003e${formatRupiah(t.grand)}\u003c/b\u003e\u003c/td\u003e\n        \u003ctd style=\"font-size:9pt\"\u003e${p.rekening||\"\"}\u003c/td\u003e\n        \u003ctd class=\"ttd-cell\"\u003e${i+1}.\u003c/td\u003e\n      \u003c/tr\u003e\n    `;\n  }).join(\"\");\n\n  return `\n    \u003cdiv class=\"sheet landscape\"\u003e\n      ${kopHTML()}\n      \u003cdiv class=\"doc-title\"\u003eDAFTAR NOMINATIF PEMBAYARAN PERJALANAN DINAS\u003c/div\u003e\n      \u003cdiv class=\"doc-subtitle\"\u003e\n        \u003cdiv\u003e${h.judulKegiatan||\"—\"}\u003c/div\u003e\n        \u003cdiv style=\"margin-top:4px\"\u003eSesuai Surat Perintah Tugas Nomor: \u003cb\u003e${h.nomorSPT||\"—\"}\u003c/b\u003e Tanggal: \u003cb\u003e${formatTanggalID(h.tanggalSPT)||\"—\"}\u003c/b\u003e\u003c/div\u003e\n      \u003c/div\u003e\n\n      \u003ctable class=\"doc-table\"\u003e\n        \u003cthead\u003e\n          \u003ctr\u003e\n            \u003cth rowspan=\"2\" style=\"width:3%\"\u003eNo\u003c/th\u003e\n            \u003cth rowspan=\"2\" style=\"width:13%\"\u003eNama / NIP\u003c/th\u003e\n            \u003cth rowspan=\"2\" style=\"width:4%\"\u003eGol\u003c/th\u003e\n            \u003cth rowspan=\"2\" style=\"width:11%\"\u003eJabatan\u003c/th\u003e\n            \u003cth rowspan=\"2\" style=\"width:7%\"\u003eTujuan\u003c/th\u003e\n            \u003cth rowspan=\"2\" style=\"width:7%\"\u003eTgl Pelaksanaan\u003c/th\u003e\n            \u003cth colspan=\"5\"\u003eBiaya Perjalanan (Rp)\u003c/th\u003e\n            \u003cth rowspan=\"2\" style=\"width:9%\"\u003eJumlah\u003c/th\u003e\n            \u003cth rowspan=\"2\" style=\"width:8%\"\u003eRekening\u003c/th\u003e\n            \u003cth rowspan=\"2\" style=\"width:10%\"\u003eTTD\u003c/th\u003e\n          \u003c/tr\u003e\n          \u003ctr\u003e\n            \u003cth\u003eTiket PP\u003c/th\u003e\n            \u003cth\u003eTaksi\u003c/th\u003e\n            \u003cth\u003eTaksi Daerah\u003c/th\u003e\n            \u003cth\u003eUang Harian\u003c/th\u003e\n            \u003cth\u003ePenginapan\u003c/th\u003e\n          \u003c/tr\u003e\n        \u003c/thead\u003e\n        \u003ctbody\u003e\n          ${rows}\n          \u003ctr\u003e\n            \u003ctd colspan=\"6\" class=\"ctr\"\u003e\u003cb\u003eJUMLAH\u003c/b\u003e\u003c/td\u003e\n            \u003ctd class=\"num\"\u003e\u003cb\u003e${formatRupiah(tot.tiket)}\u003c/b\u003e\u003c/td\u003e\n            \u003ctd class=\"num\"\u003e\u003cb\u003e${formatRupiah(tot.taksi)}\u003c/b\u003e\u003c/td\u003e\n            \u003ctd class=\"num\"\u003e\u003cb\u003e${formatRupiah(tot.taksiDaerah)}\u003c/b\u003e\u003c/td\u003e\n            \u003ctd class=\"num\"\u003e\u003cb\u003e${formatRupiah(tot.uh)}\u003c/b\u003e\u003c/td\u003e\n            \u003ctd class=\"num\"\u003e\u003cb\u003e${formatRupiah(tot.penginapan)}\u003c/b\u003e\u003c/td\u003e\n            \u003ctd class=\"num\"\u003e\u003cb\u003e${formatRupiah(tot.grand)}\u003c/b\u003e\u003c/td\u003e\n            \u003ctd colspan=\"2\"\u003e\u003c/td\u003e\n          \u003c/tr\u003e\n        \u003c/tbody\u003e\n      \u003c/table\u003e\n\n      \u003cdiv style=\"margin-top:8px; font-size:10pt;\"\u003e\u003ci\u003eTerbilang: ${terbilang(tot.grand)}\u003c/i\u003e\u003c/div\u003e\n\n      \u003cdiv class=\"ttd-grid\"\u003e\n        \u003cdiv class=\"ttd\"\u003e\n          \u003cdiv\u003eMengetahui,\u003c/div\u003e\n          \u003cdiv class=\"role\"\u003ePejabat Pembuat Komitmen,\u003c/div\u003e\n          \u003cdiv class=\"name\"\u003e${h.namaPPK||\"—\"}\u003c/div\u003e\n          \u003cdiv class=\"nip\"\u003eNIP. ${h.nipPPK||\"—\"}\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"ttd\"\u003e\n          \u003cdiv\u003e${h.kotaTerbit||\"Pontianak\"}, ${formatTanggalID(h.tanggalSPT)||\"—\"}\u003c/div\u003e\n          \u003cdiv class=\"role\"\u003eBendahara Pengeluaran,\u003c/div\u003e\n          \u003cdiv class=\"name\"\u003e${h.namaBendahara||\"—\"}\u003c/div\u003e\n          \u003cdiv class=\"nip\"\u003eNIP. ${h.nipBendahara||\"—\"}\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n  `;\n}\n\nfunction dprGroupTotal(g){\n  return (g.items||[]).reduce((s,it)=\u003es + (num(it.qty1)||1)*(num(it.qty2)||1)*num(it.tarif), 0);\n}\nfunction dprItemJumlah(it){\n  return (num(it.qty1)||1)*(num(it.qty2)||1)*num(it.tarif);\n}\n\nfunction sheetDPRGroupHTML(groupKey){\n  const d = state.dpr;\n  const g = d[groupKey];\n  const total = dprGroupTotal(g);\n  const tglSurat = formatTanggalID(d.tanggalSurat) || \"—\";\n  const tglCetak = formatTanggalID(d.tanggalCetak || d.tanggalSurat) || \"—\";\n  const noLabel = (i)=\u003e String(i+1).padStart(2,\"0\");\n\n  const rows = (g.items||[]).map((it,i)=\u003e{\n    const j = dprItemJumlah(it);\n    const calc = `${num(it.qty1)||1} ${it.sat1||\"Org\"} × ${num(it.qty2)||1} ${it.sat2||\"Hari\"} × ${formatRupiah(it.tarif)}`;\n    return `\n      \u003ctr\u003e\n        \u003ctd class=\"ctr\"\u003e${noLabel(i)}\u003c/td\u003e\n        \u003ctd\u003e\n          ${it.uraian||\"—\"}\u003cbr/\u003e\n          \u003cspan style=\"color:#555; font-size:9pt\"\u003e${calc}\u003c/span\u003e\n        \u003c/td\u003e\n        \u003ctd class=\"num\"\u003e${formatRupiah(j)}\u003c/td\u003e\n        \u003ctd style=\"font-size:9pt\"\u003e${it.ket||\"\"}\u003c/td\u003e\n      \u003c/tr\u003e\n    `;\n  }).join(\"\");\n\n  const subtitleLines = [g.baris1, g.baris2, g.kategori].filter(Boolean)\n    .map(x=\u003e`\u003cdiv\u003e${x}\u003c/div\u003e`).join(\"\");\n\n  return `\n    \u003cdiv class=\"sheet\"\u003e\n      ${kopHTML()}\n      \u003cdiv class=\"doc-title\"\u003eDAFTAR PENGELUARAN RIIL\u003c/div\u003e\n      \u003cdiv class=\"doc-subtitle\"\u003e\n        ${subtitleLines}\n        ${g.kode?`\u003cdiv\u003e${g.kode}\u003c/div\u003e`:\"\"}\n      \u003c/div\u003e\n\n      \u003cdiv style=\"margin-top:14px\"\u003eYang bertandatangan dibawah ini :\u003c/div\u003e\n      \u003ctable style=\"margin-top:6px; font-size:11pt;\"\u003e\n        \u003ctr\u003e\u003ctd style=\"width:90px\"\u003eNama\u003c/td\u003e\u003ctd\u003e:\u003c/td\u003e\u003ctd\u003e\u003cb\u003e${d.namaTtd||\"—\"}\u003c/b\u003e\u003c/td\u003e\u003c/tr\u003e\n        \u003ctr\u003e\u003ctd\u003eNIP\u003c/td\u003e\u003ctd\u003e:\u003c/td\u003e\u003ctd\u003e${d.nipTtd||\"—\"}\u003c/td\u003e\u003c/tr\u003e\n        \u003ctr\u003e\u003ctd\u003eJabatan\u003c/td\u003e\u003ctd\u003e:\u003c/td\u003e\u003ctd\u003e${d.jabatanTtd||\"—\"}\u003c/td\u003e\u003c/tr\u003e\n      \u003c/table\u003e\n\n      \u003cdiv style=\"margin-top:10px\"\u003e\n        Berdasarkan Surat Perintah Tanggal \u003cb\u003e${tglSurat}\u003c/b\u003e Nomor: \u003cb\u003e${d.nomorSurat||\"—\"}\u003c/b\u003e,\n        dengan ini menyatakan dengan sesungguhnya bahwa:\n      \u003c/div\u003e\n\n      \u003col style=\"padding-left:20px; margin-top:8px;\"\u003e\n        \u003cli\u003eBiaya ${(g.kategori||\"belanja\").toLowerCase()} yang dikeluarkan, meliputi :\u003c/li\u003e\n      \u003c/ol\u003e\n\n      \u003ctable class=\"doc-table\" style=\"margin-top:6px;\"\u003e\n        \u003cthead\u003e\n          \u003ctr\u003e\n            \u003cth style=\"width:5%\"\u003eNo\u003c/th\u003e\n            \u003cth\u003eRincian Biaya\u003c/th\u003e\n            \u003cth style=\"width:22%\"\u003eJumlah\u003c/th\u003e\n            \u003cth style=\"width:22%\"\u003eKeterangan\u003c/th\u003e\n          \u003c/tr\u003e\n        \u003c/thead\u003e\n        \u003ctbody\u003e\n          ${rows}\n          \u003ctr\u003e\n            \u003ctd colspan=\"2\" class=\"ctr\"\u003e\u003cb\u003eJUMLAH\u003c/b\u003e\u003c/td\u003e\n            \u003ctd class=\"num\"\u003e\u003cb\u003e${formatRupiah(total)}\u003c/b\u003e\u003c/td\u003e\n            \u003ctd\u003e\u003c/td\u003e\n          \u003c/tr\u003e\n          \u003ctr\u003e\n            \u003ctd colspan=\"4\"\u003e\u003ci class=\"terbilang\"\u003eTerbilang: ${terbilang(total)}\u003c/i\u003e\u003c/td\u003e\n          \u003c/tr\u003e\n        \u003c/tbody\u003e\n      \u003c/table\u003e\n\n      \u003col start=\"2\" style=\"padding-left:20px; margin-top:10px;\"\u003e\n        \u003cli\u003eJumlah uang tersebut pada angka 1 di atas benar-benar dikeluarkan untuk pelaksanaan kegiatan dimaksud, dan apabila di kemudian hari terdapat kelebihan atas pembayaran, kami bersedia untuk menyetorkan kelebihan tersebut ke Kas Negara.\u003c/li\u003e\n      \u003c/ol\u003e\n\n      \u003cdiv style=\"margin-top:8px\"\u003e\n        Demikian pernyataan ini kami buat dengan sebenarnya, untuk dipergunakan sebagaimana mestinya.\n      \u003c/div\u003e\n\n      \u003cdiv class=\"ttd-grid\"\u003e\n        \u003cdiv class=\"ttd\"\u003e\n =\"color:#666\"\u003e${formatRupiah(p.tiketPulang)}\u003c/span\u003e`, ket: p.buktiTiket||\"Bukti Terlampir\" });\n  rincianLines.push({ desc:`- Uang Harian \u0026nbsp; ${num(p.lamaHari)} × ${formatRupiah(p.uangHarian)}`, amt: formatRupiah(t.uangHarianTotal), ket: p.buktiUangHarian||\"Tidak Ada Bukti\" });\n  if (num(p.penginapan))  rincianLines.push({ desc:`- Penginapan`, amt: formatRupiah(p.penginapan), ket: p.buktiPenginapan||\"Bukti Terlampir\" });\n  if (num(p.taksi))       rincianLines.push({ desc:`- Taksi`, amt: formatRupiah(p.taksi), ket: p.buktiTaksi||\"Bukti Terlampir\" });\n  if (num(p.taksiDaerah)) rincianLines.push({ desc:`- Taksi Daerah`, amt: formatRupiah(p.taksiDaerah), ket: p.buktiTaksiDaerah||\"Bukti Terlampir\" });\n  if (num(p.transportKab))rincianLines.push({ desc:`- Transport Antar Kab/Kota`, amt: formatRupiah(p.transportKab), ket: p.buktiTransportKab||\"Tidak Ada Bukti\" });\n  if (num(p.representasi))rincianLines.push({ desc:`- Uang Representasi`, amt: formatRupiah(p.representasi), ket: p.buktiRepresentasi||\"Tidak Ada Bukti\" });\n  const rincianRows = rincianLines.map((r,ri)=\u003e{\n    const noCell = ri===0? `\u003ctd class=\"ctr\" rowspan=\"${rincianLines.length}\"\u003e1\u003c/td\u003e` : \"\";\n    return `\u003ctr\u003e${noCell}\u003ctd\u003e${r.desc}\u003c/td\u003e\u003ctd class=\"num\"\u003e${r.amt}\u003c/td\u003e\u003ctd style=\"font-size:10pt\" class=\"ctr\"\u003e${r.ket}\u003c/td\u003e\u003c/tr\u003e`;\n  }).join(\"\");\n\n  return `\n    \u003cdiv class=\"sheet\"\u003e\n      ${kopHTML()}\n      \u003cdiv class=\"doc-title\"\u003eRINCIAN BIAYA PERJALANAN DINAS\u003c/div\u003e\n      \u003ctable style=\"margin: 6px auto 10px; font-size:11pt\"\u003e\n        \u003ctr\u003e\u003ctd\u003eLampiran SPD Nomor\u003c/td\u003e\u003ctd\u003e:\u003c/td\u003e\u003ctd\u003e\u003cb\u003e${p.noSPD||\"—\"}\u003c/b\u003e\u003c/td\u003e\u003c/tr\u003e\n        \u003ctr\u003e\u003ctd\u003eTanggal\u003c/td\u003e\u003ctd\u003e:\u003c/td\u003e\u003ctd window.print(), 80);\n  }\n}\n\nfunction printNominatif(){\n  if (!validateBeforePrint()) return;\n  injectPrintAndPrint(sheetNominatifHTML());\n}\nfunction validateDPR(){\n  let bad = 0;\n  document.querySelectorAll(\u0027#view-dpr .field\u0027).forEach(f=\u003ef.classList.remove(\u0027invalid\u0027));\n  if (!state.dpr.namaTtd){\n    const el = document.querySelector(\u0027[data-d=\"namaTtd\"]\u0027);\n    if (el) el.closest(\u0027.field\u0027).classList.add(\u0027invalid\u0027);\n    bad++;\n  }\n  if (bad\u003e0){ toast(\"✗ Nama penandatangan wajib diisi\"); return false; }\n  return true;\n}\nfunction printDPRGroup(groupKey){\n  if (!validateDPR()) return;\n  injectPrintAndPrint(sheetDPRGroupHTML(groupKey));\n}\nfunction printDPRBoth(){\n  if (!validateDPR()) return;\n  injectPrintAndPrint(sheetDPRGroupHTML(\u0027g1\u0027) + sheetDPRGroupHTML(\u0027g2\u0027));\n}\nfunction printRincianOne(i){\n  if (!validateBeforePrint()) return;\n  injectPrintAndPrint(sheetRincianHTML(i));\n}\nfunction printAllRincian(){\n  if (!validateBeforePrint()) return;\n  const all = state.pegawai.map((_,i)=\u003esheetRincianHTML(i)).join(\"\");\n  injectPrintAndPrint(all);\n}\n\nwindow.addEventListener(\u0027afterprint\u0027, ()=\u003e{\n  // clear print root so it doesn\u0027t bloat DOM\n  document.getElementById(\u0027print-root\u0027).innerHTML = \"\";\n  // Also clear preview body to free memory\n  ppBodyWrap.innerHTML = \"\";\n});\n\n/* ================================================================\n   DPR PIC FORM RENDER / BIND / PREVIEW\n   ================================================================ */\nfunction bindDPRHeader(){\n  document.querySelectorAll(\u0027[data-d]\u0027).forEach(el=\u003e{\n    const key = el.dataset.d;\n    el.value = state.dpr[key] ?? \"\";\n    el.oninput = ()=\u003e{\n      state.dpr[key] = el.value;\n      if (key === \u0027namaTtd\u0027){\n        const m = daftarPegawai.find(x=\u003ex.nama===el.value);\n        if (m){\n          state.dpr
